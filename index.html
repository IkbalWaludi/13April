<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Berwarna</title>
    <style>
        body {
            /* Mengatur warna latar belakang menjadi biru gelap */
            background-color: #2c3e50;
            /* Mengatur warna teks menjadi putih agar kontras */
            color: #ecf0f1;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            /* Memberi warna kuning cerah pada judul */
            color: #f1c40f;
        }

        .box {
            /* Kotak dengan warna aksen teal */
            background-color: #1abc9c;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h1>Halo, Ikbal!</h1>
    <div class="box">
        <p>Ini adalah tampilan index.html di branch <strong>add-color</strong>.</p>
    </div>

</body>
</html>
